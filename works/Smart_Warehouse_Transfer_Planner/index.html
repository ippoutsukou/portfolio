<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart Warehouse Transfer Planner</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <nav class="top-nav">
        <a href="index.html">単品判定</a>
        <a href="batch.html">複数明細判定</a>
        <a href="dashboard.html">倉庫サマリー</a>
        <a href="items.html">品目別サマリー</a>
        <a href="history.html">判定履歴</a>
      </nav>
      <section class="hero">
        <p class="eyebrow">Warehouse Decision Console</p>
        <h1>Smart Warehouse Transfer Planner</h1>
        <p class="lead">
          搬入・搬出条件を入力すると、候補倉庫と理由をすぐに確認できます。
        </p>
        <p class="demo-banner">
          これは GitHub Pages 用のデモサンプルです。値は固定で、簡易判定ロジックで動作します。
        </p>
      </section>

      <section class="panel">
        <form id="judge-form" class="judge-form" data-endpoint="/warehouse-judge">
          <label>
            <span>搬送区分</span>
            <select name="action" required>
              <option value="搬入">搬入</option>
              <option value="搬出">搬出</option>
            </select>
          </label>

          <label>
            <span>品目</span>
            <input name="item_name" type="text" required maxlength="255" value="A品" />
          </label>

          <label>
            <span>数量</span>
            <input name="quantity" type="number" min="0.01" step="0.01" required value="30" />
          </label>

          <label>
            <span>行先 / 対象拠点</span>
            <input name="destination" type="text" required maxlength="255" value="東京" />
          </label>

          <label>
            <span>希望日</span>
            <input name="requested_date" type="date" />
          </label>

          <button type="submit">判定する</button>
        </form>
      </section>

      <section class="panel results" aria-live="polite">
        <div class="result-header">
          <h2>判定結果</h2>
          <p id="status-message">条件を入力して判定してください。</p>
        </div>

        <article id="best-candidate" class="best-candidate">
          <h3>第1候補</h3>
          <p class="empty">まだ結果がありません。</p>
        </article>

        <article class="candidate-panel">
          <h3>候補順位</h3>
          <ol id="candidate-list"></ol>
        </article>
      </section>
    </main>

    <script src="mock-data.js" defer></script>
    <script src="mock-api.js" defer></script>
    <script src="app.js" defer></script>
  </body>
</html>
